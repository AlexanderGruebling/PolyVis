<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Overview — PolyVis</title>
    <link href="src/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="overview-loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading data&hellip;</div>
</div>
<nav>
    <img src="PolyVisLogo.png" alt="PolyVis Logo" class="logoImg">
    <a href="/" class="nav-link active">Overview</a>
    <a href="/analysis" class="nav-link">Analysis</a>
    <a href="/about" class="nav-link">About</a>
</nav>
<main class="overview-layout">
    <div class="overview-card overview-card-full">
        <h2>Hypnogram</h2>
        <div id="overview-hypnogram"></div>
    </div>
    <div class="overview-card overview-card-full">
        <h2>SpO₂</h2>
        <div id="overview-spo2"></div>
    </div>
    <div class="overview-row">
        <div class="overview-card">
            <h2>Sleep Stages</h2>
            <ul class="sleep-stages-list">
                <li><strong>W</strong> — Wake</li>
                <li><strong>R</strong> — REM (Rapid Eye Movement)</li>
                <li><strong>1</strong> — N1 (Light sleep)</li>
                <li><strong>2</strong> — N2 (Deep sleep)</li>
                <li><strong>3</strong> — N3 (Slow-wave sleep)</li>
                <li><strong>4</strong> — N4 (Very deep sleep)</li>
            </ul>
        </div>
        <div id="overview-metrics" class="overview-card">
            <h2>Clinical Metrics</h2>
            <div class="overview-metrics-grid"></div>
        </div>
    </div>
</main>
<script type="module" src="/src/overview.js"></script>
</body>
</html>
