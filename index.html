<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overview — PolyVis</title>
    <link href="src/styles.css" rel="stylesheet"/>
    <style>
        .overview-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: block;
        }

        .overview-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
        }

        .overview-card h2 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin: 0 0 16px 0;
        }

        #overview-hypnogram > div {
            width: 100% !important;
        }
        #overview-hypnogram svg {
            width: 100% !important;
        }

        .overview-card-full {
            margin-bottom: 24px;
        }

        .sleep-stages-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sleep-stages-list li {
            padding: 5px 0;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .sleep-stages-list li:last-child {
            border-bottom: none;
        }

        .overview-metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .overview-metric {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .overview-metric-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .overview-metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .overview-metric-value .severity {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .overview-metric-note {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .overview-metric.subdued .overview-metric-value {
            color: var(--text-secondary);
        }

        /* hide loading overlay on load */
        #overview-loading {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        #overview-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="overview-loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading data&hellip;</div>
</div>
<nav>
    <img src="PolyVisLogo.png" alt="PolyVis Logo" class="logoImg">
    <a href="/" class="nav-link active">Overview</a>
    <a href="/analysis" class="nav-link">Analysis</a>
    <a href="/about" class="nav-link">About</a>
</nav>
<main class="overview-layout">
    <div class="overview-card overview-card-full">
        <h2>Hypnogram</h2>
        <div id="overview-hypnogram"></div>
    </div>
    <div class="overview-row">
        <div class="overview-card">
            <h2>Sleep Stages</h2>
            <ul class="sleep-stages-list">
                <li><strong>W</strong> — Wake</li>
                <li><strong>R</strong> — REM (Rapid Eye Movement)</li>
                <li><strong>1</strong> — N1 (Light sleep)</li>
                <li><strong>2</strong> — N2 (Deep sleep)</li>
                <li><strong>3</strong> — N3 (Slow-wave sleep)</li>
                <li><strong>4</strong> — N4 (Very deep sleep)</li>
            </ul>
        </div>
        <div id="overview-metrics" class="overview-card">
            <h2>Clinical Metrics</h2>
            <div class="overview-metrics-grid"></div>
        </div>
    </div>
</main>
<script type="module" src="/src/overview.js"></script>
</body>
</html>
