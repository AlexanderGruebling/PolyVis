<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PolyVis</title>
</head>
<body>
<nav>
    <img src="PolyVisLogo.png" alt="PolyVis Logo" class="logoImg">
</nav>
<main>
    <div class="col-1">
        <div id="container2">
            <svg class="hypno" width="640" height="400"></svg>
        </div>
        <div id="legend">
            <div id="controls">
                <strong>Filters:</strong>
                <div>
                    <input type="checkbox" id="displayArousalEvents"/>
                    <label for="displayArousalEvents">Display Arousal Events</label>
                    <div id="arouEventsLabel"></div>
                </div>
                <div>
                    <input type="checkbox" id="displayRespEvents"/>
                    <label for="displayRespEvents">Display Respiratory Events</label>
                </div>
            </div>
            <hr>
            <strong>Legend:</strong>
            <ul>
                <li>W: Wake</li>
                <li>R: REM (Rapid Eye Movement)</li>
                <li>1: First stage of deep sleep</li>
                <li>2: Second stage of deep sleep</li>
                <li>3: Third stage of deep sleep</li>
                <li>4: Fourth stage of deep sleep</li>
            </ul>
        </div>
    </div>
    <div id="container"></div>
    <div id="container3"></div>
</main>
<script type="module" src="app.js"></script>
<link href="styles.css" rel="stylesheet"/>
</body>
</html>
