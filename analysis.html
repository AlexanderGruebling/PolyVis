<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PolyVis</title>
    <link href="src/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading data&hellip;</div>
</div>
<nav>
    <img src="PolyVisLogo.png" alt="PolyVis Logo" class="logoImg">
    <a href="/" class="nav-link">Overview</a>
    <a href="/analysis" class="nav-link active">Analysis</a>
    <a href="/about" class="nav-link">About</a>
</nav>
<main>
    <div class="sidebar">
        <div id="hypnogram-section">
            <h3>Hypnogram</h3>
            <div id="container2"></div>
        </div>
        <div class="sidebar-section">
            <h3>Controls</h3>
            <div id="controls">
                <div class="row">
                    <input type="button" id="resetButton" value="Reset Zoom">
                </div>
            </div>
        </div>
        <div class="sidebar-section">
            <h3>Events</h3>
            <div id="eventsContainer"></div>
        </div>
        <div class="sidebar-section">
            <h3>Sleep Stages</h3>
            <ul>
                <li>W — Wake</li>
                <li>R — REM (Rapid Eye Movement)</li>
                <li>1 — N1 (Light sleep)</li>
                <li>2 — N2 (Deep sleep)</li>
                <li>3 — N3 (Slow-wave sleep)</li>
                <li>4 — N4 (Very deep sleep)</li>
            </ul>
        </div>
    </div>
    <div class="plot-area" id="container"></div>
</main>
<script type="module" src="/src/main.js"></script>
</body>
</html>
